<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneo FIFA 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --green:#1a4a2e; --green-mid:#2d7a4f;
  --gold:#f0a500;
  --bg:#0d0d0d; --bg2:#141414; --bg3:#1c1c1c;
  --border:rgba(255,255,255,0.08); --text:#f0f0f0; --text2:#888;
  --ps5:#003087;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;gap:12px;flex-wrap:wrap;}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--gold);white-space:nowrap;}
.nav-tabs{display:flex;gap:3px;flex-wrap:wrap;}
.nav-tab{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid transparent;color:var(--text2);transition:all .2s;white-space:nowrap;}
.nav-tab:hover{color:var(--text);background:var(--bg3);}
.nav-tab.active{background:var(--green);color:#fff;border-color:var(--green-mid);}
.nav-tab.hidden{display:none;}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-user{font-size:12px;color:var(--text2);}
.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#2ecc71;margin-right:4px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* VIEWS */
.view{display:none;padding:20px;}
.view.active{display:block;}

/* BASE */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px;}
.card-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;color:var(--gold);margin-bottom:14px;}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.field label{font-size:12px;color:var(--text2);}
input[type=text],input[type=email],input[type=password],input[type=number],select{
  background:var(--bg3);border:1px solid var(--border);border-radius:7px;
  color:var(--text);padding:9px 12px;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;width:100%;
}
input:focus,select:focus{border-color:var(--green-mid);}
.btn{padding:9px 18px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.btn:hover{background:#222;border-color:rgba(255,255,255,.2);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn.green{background:var(--green);border-color:var(--green-mid);color:#fff;}
.btn.green:hover{background:var(--green-mid);}
.btn.gold{background:var(--gold);border-color:#c88a00;color:#000;font-weight:600;}
.btn.gold:hover{background:#e09800;}
.btn.danger{background:rgba(192,57,43,.15);border-color:rgba(192,57,43,.4);color:#e74c3c;}
.btn.danger:hover{background:rgba(192,57,43,.3);}
.btn.sm{padding:5px 11px;font-size:12px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
.alert{padding:10px 14px;border-radius:7px;font-size:13px;margin-bottom:12px;}
.alert.info{background:rgba(26,74,46,.25);border:1px solid rgba(45,122,79,.4);color:#4cde8c;}
.alert.error{background:rgba(192,57,43,.2);border:1px solid rgba(192,57,43,.4);color:#e74c3c;}
.alert.warn{background:rgba(240,165,0,.12);border:1px solid rgba(240,165,0,.3);color:var(--gold);}

/* AUTH */
.auth-wrap{max-width:400px;margin:60px auto;}
.auth-logo{text-align:center;margin-bottom:28px;}
.auth-logo div{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;color:var(--gold);}
.auth-logo p{font-size:13px;color:var(--text2);margin-top:4px;}

/* TORNEOS */
.torneos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:20px;}
.torneo-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .2s;}
.torneo-card:hover{border-color:var(--gold);background:rgba(240,165,0,.04);}
.torneo-card.selected{border-color:var(--gold);box-shadow:0 0 12px rgba(240,165,0,.15);}
.torneo-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--gold);margin-bottom:6px;}
.torneo-meta{font-size:12px;color:var(--text2);display:flex;gap:10px;flex-wrap:wrap;}
.badge{font-size:10px;padding:3px 8px;border-radius:4px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.badge.inscripcion{background:rgba(26,74,46,.3);color:#4cde8c;border:1px solid rgba(45,122,79,.4);}
.badge.en_curso{background:rgba(240,165,0,.15);color:var(--gold);border:1px solid rgba(240,165,0,.3);}
.badge.finalizado{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}

/* JUGADORES */
.jugadores-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;margin-bottom:14px;}
.player-inp{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 10px;}
.player-num{width:22px;height:22px;border-radius:50%;background:var(--green);font-size:11px;font-weight:600;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.player-inp input{background:transparent;border:none;color:var(--text);font-size:13px;width:100%;padding:0;}
.player-inp input:focus{outline:none;}
.jugador-tag{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 12px;}
.jugador-avatar{width:28px;height:28px;border-radius:50%;background:var(--green);font-size:11px;font-weight:600;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.jugador-nombre{flex:1;font-size:13px;}
.jugador-num{font-size:11px;color:var(--text2);}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:16px;}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold);}
.stat-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}

/* MANAGE */
.match-queue{display:flex;flex-direction:column;gap:10px;}
.match-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.match-card.playing{border-color:var(--gold);background:rgba(240,165,0,.05);}
.match-card.done{opacity:.55;}
.match-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.round-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;background:var(--bg2);color:var(--text2);text-transform:uppercase;letter-spacing:.06em;}
.console-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;background:var(--ps5);color:#fff;}
.match-players{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.mp{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;text-align:center;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;}
.mp:hover{border-color:rgba(255,255,255,.3);}
.mp.winner{background:rgba(26,74,46,.4);border-color:var(--green-mid);color:#4cde8c;}
.mp.loser{opacity:.4;text-decoration:line-through;}
.mp.tbd{color:var(--text2);font-style:italic;font-size:13px;cursor:default;}
.vs-label{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--text2);}
.score-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.score-row input{width:52px;text-align:center;}
.score-sep{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text2);}
.tbd-notice{font-size:12px;color:var(--text2);font-style:italic;text-align:center;padding:8px 0;}

/* BRACKET */
.bracket-scroll{overflow-x:auto;padding-bottom:16px;}
.bracket-flex{display:flex;gap:0;min-width:fit-content;}
.b-round{min-width:160px;flex:1;}
.b-round-label{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1.5px;color:var(--gold);text-align:center;padding:8px 6px;border-bottom:1px solid var(--border);margin-bottom:8px;}
.b-col{display:flex;flex-direction:column;justify-content:space-around;padding:0 5px;}
.b-match{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin:6px 0;}
.b-match.playing{border-color:var(--gold);box-shadow:0 0 10px rgba(240,165,0,.18);}
.b-player{display:flex;align-items:center;gap:7px;padding:7px 10px;font-size:13px;border-bottom:1px solid var(--border);}
.b-player:last-child{border-bottom:none;}
.b-player.winner{background:rgba(26,74,46,.35);color:#4cde8c;font-weight:600;}
.b-player.loser{opacity:.35;text-decoration:line-through;}
.b-player.tbd{color:var(--text2);font-style:italic;font-size:12px;}
.b-score{margin-left:auto;font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--gold);}
.b-console-tag{font-size:10px;padding:2px 5px;background:var(--ps5);color:#fff;border-radius:3px;font-weight:600;}

/* TV */
#view-display{background:#000;min-height:100vh;padding:0;}
.tv-header{background:linear-gradient(135deg,#0a2016 0%,#1a4a2e 50%,#0a2016 100%);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--gold);}
.tv-logo{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:4px;color:var(--gold);text-shadow:0 0 30px rgba(240,165,0,.4);}
.tv-sub{font-size:12px;color:rgba(255,255,255,.5);letter-spacing:2px;text-transform:uppercase;}
.tv-body{padding:20px 28px;display:grid;grid-template-columns:1fr 320px;gap:20px;}
.tv-sec{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.tv-sec::after{content:'';flex:1;height:1px;background:rgba(240,165,0,.3);}
.tv-consoles{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;}
.tv-con-card{background:rgba(0,48,135,.2);border:1px solid rgba(0,112,204,.35);border-radius:10px;padding:12px 16px;}
.tv-con-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:#5b9ef4;margin-bottom:8px;}
.tv-con-match{display:flex;align-items:center;justify-content:space-between;}
.tv-pname{font-size:15px;font-weight:600;color:#fff;text-align:center;}
.tv-pscore{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--gold);text-align:center;}
.tv-vs{font-family:'Bebas Neue',sans-serif;font-size:24px;color:rgba(255,255,255,.25);padding:0 10px;}
.tv-round-tag{font-size:10px;padding:3px 8px;background:rgba(240,165,0,.12);border:1px solid rgba(240,165,0,.25);color:var(--gold);border-radius:4px;text-align:center;margin-top:6px;font-weight:600;letter-spacing:.05em;}
.tv-empty{font-size:12px;color:rgba(255,255,255,.25);font-style:italic;text-align:center;padding:6px 0;}
.tv-queue{display:flex;flex-direction:column;gap:7px;}
.tv-qi{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:9px 12px;display:flex;align-items:center;gap:10px;}
.tv-qnum{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.07);font-size:10px;color:var(--text2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tv-qnames{font-size:13px;color:var(--text);}
.tv-qround{font-size:11px;color:var(--text2);margin-top:2px;}
.tv-bm-round{margin-bottom:10px;}
.tv-bm-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.tv-bm-matches{display:flex;gap:5px;flex-wrap:wrap;}
.tv-bm-match{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 9px;font-size:11px;min-width:120px;}
.tv-bm-match.act{border-color:var(--gold);}
.tv-bm-p{padding:2px 0;color:var(--text2);}
.tv-bm-p.w{color:#4cde8c;font-weight:600;}
.tv-bm-p.l{opacity:.35;text-decoration:line-through;}
.tv-champion{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;}
.tv-trophy{font-size:80px;margin-bottom:14px;animation:bounce 1.5s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.tv-ch-label{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;color:rgba(255,255,255,.45);margin-bottom:6px;}
.tv-ch-name{font-family:'Bebas Neue',sans-serif;font-size:66px;letter-spacing:5px;color:var(--gold);text-shadow:0 0 40px rgba(240,165,0,.5);}

/* LOADER */
.loader{display:flex;align-items:center;gap:8px;color:var(--text2);font-size:13px;padding:20px 0;}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:860px){.tv-body{grid-template-columns:1fr;}}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">⚽ FIFA 2026</div>
  <div class="nav-tabs">

    <div class="nav-tab hidden" id="ntab-manage"   onclick="showView('manage')">🎮 Partidos</div>

<!-- AUTH -->
<div class="view active" id="view-auth">

      <div>⚽ TORNEO FIFA 2026</div>

<!-- TORNEOS -->
<div class="view" id="view-torneos">

    <div class="section-title" style="margin:0">Torneos</div>
    <button class="btn green" onclick="showNuevoTorneo()">+ Nuevo torneo</button>
  </div>

  <!-- Formulario nuevo torneo -->
  <div class="card" id="card-nuevo-torneo" style="display:none">

    <div id="nt-msg"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="field"><label>Nombre</label><input type="text" id="nt-nombre" placeholder="Torneo FIFA Mayo 2026"></div>
      <div class="field"><label>Fecha</label><input type="date" id="nt-fecha"></div>
      <div class="field"><label>Consolas PS5</label>
        <select id="nt-consolas">
          <option value="1">1 PS5</option>
          <option value="2" selected>2 PS5</option>
          <option value="3">3 PS5</option>
          <option value="4">4 PS5</option>
        </select>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn gold" onclick="crearTorneo()">Crear torneo</button>
      <button class="btn" onclick="document.getElementById('card-nuevo-torneo').style.display='none'">Cancelar</button>

  <div class="loader" id="loader-torneos"><div class="spinner"></div>Cargando...</div>
  <div class="torneos-grid" id="torneos-grid"></div>

        <div style="font-size:12px;color:var(--text2)" id="pt-meta"></div>
      </div>
      <div class="btn-row" id="pt-actions"></div>
    </div>

    <!-- Gestión de jugadores -->
    <div class="card" id="card-jugadores">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div class="card-title" style="margin:0" id="jugadores-count-label">Jugadores</div>
        <button class="btn sm green" id="btn-agregar-jugador" onclick="mostrarFormJugador()">+ Agregar jugador</button>
      </div>

      <!-- Form agregar jugador -->
      <div id="form-jugador" style="display:none;margin-bottom:14px;">
        <div style="display:flex;gap:8px;align-items:flex-end;">
          <div class="field" style="flex:1;margin:0"><label>Nombre del jugador</label><input type="text" id="inp-jugador" placeholder="Nombre o apodo" maxlength="20" onkeydown="if(event.key==='Enter')agregarJugador()"></div>
          <button class="btn green sm" onclick="agregarJugador()">Agregar</button>
          <button class="btn sm" onclick="ocultarFormJugador()">Cancelar</button>
        </div>
        <div id="jugador-msg" style="margin-top:8px"></div>
      </div>

      <div id="jugadores-list"></div>
      <div class="btn-row" style="margin-top:12px" id="btn-iniciar-wrap"></div>
    </div>
  </div>
</div>

<!-- MANAGE -->
<div class="view" id="view-manage">
  <div class="section-title">Gestión de Partidos</div>
  <div class="stats-grid" id="stats-grid"></div>
  <div id="manage-body"></div>
</div>

<!-- BRACKET -->
<div class="view" id="view-bracket">
  <div class="section-title">Bracket</div>
  <div class="bracket-scroll" id="bracket-container"></div>
</div>

<!-- TV DISPLAY -->
<div class="view" id="view-display">
  <div class="tv-header">
    <div>
      <div class="tv-logo" id="tv-title">⚽ FIFA 2026</div>
      <div class="tv-sub">Parque Tempisque · En vivo</div>
    </div>
    <div style="text-align:right">
      <div id="tv-clock" style="font-family:'Bebas Neue',sans-serif;font-size:26px;color:rgba(255,255,255,.4);letter-spacing:2px;"></div>
      <div id="tv-last-refresh" style="font-size:11px;color:rgba(255,255,255,.25);margin-top:2px;letter-spacing:1px;"></div>
    </div>
  </div>
  <div id="tv-body"></div>
</div>

<!-- BRACKET / TV público (sin login) -->
<div class="view" id="view-public">
  <div style="display:flex;gap:8px;margin-bottom:16px;">
    <button class="btn sm active" id="pub-tab-bracket" onclick="pubTab('bracket')">🏆 Bracket</button>
    <button class="btn sm" id="pub-tab-tv" onclick="pubTab('tv')">📺 Pantalla TV</button>
  </div>
  <div id="pub-bracket"></div>
  <div id="pub-tv" style="display:none"></div>
</div>

// ===================== BRACKET LOGIC =====================
function buildRounds(players, consolasCount) {
  // Opción B: los jugadores con mejor seed (top) tienen bye, el resto juega R0.
  // Los bye players se distribuyen UNO por partido en R1, no juntos.
  // Ej 6 jugadores: P1 y P2 tienen bye. R0: P3vsP4, P5vsP6.
  // R1: P1 vs ganador(P3vsP4),  P2 vs ganador(P5vsP6).
  const n = players.length;
  const pow2 = nextPow2(n);
  const byeCount = pow2 - n;
  const ts = Date.now();
  rounds = [];

  const byePlayers = players.slice(0, byeCount);   // avanzan directo
  const r0Players  = players.slice(byeCount);       // juegan R0

  // R0: partidos entre los jugadores sin bye
  const r0 = [];
  for (let i = 0; i < r0Players.length / 2; i++) {
    r0.push({ id: ts + i, torneo_id: activeTorneo.id, ronda: 0, posicion: i,
      p1: r0Players[i * 2], p2: r0Players[i * 2 + 1],
      score1: null, score2: null, ganador: null, consola: null, estado: 'pendiente' });
  }
  if (r0.length > 0) rounds.push(r0);

  // Rondas siguientes
  const totalR = Math.log2(pow2);
  const startR = r0.length > 0 ? 1 : 0;

  for (let r = startR; r < totalR; r++) {
    const matchCount = pow2 / Math.pow(2, r);   // total jugadores en esta ronda
    const numMatches = matchCount / 2;
    const rnd = [];
    for (let i = 0; i < numMatches; i++) {
      let p1 = 'TBD', p2 = 'TBD';
      if (r === startR) {
        // Llenar slots en orden: primero bye players, luego TBD (ganadores R0)
        // Slot global = i*2 y i*2+1 dentro del array de esta ronda
        // Primeros byeCount slots = bye players, resto = TBD
        const slotA = i * 2, slotB = i * 2 + 1;
        p1 = slotA < byePlayers.length ? byePlayers[slotA] : 'TBD';
        p2 = slotB < byePlayers.length ? byePlayers[slotB] : 'TBD';
      }
      rnd.push({ id: ts + r * 10000 + i, torneo_id: activeTorneo.id, ronda: r, posicion: i,
        p1, p2, score1: null, score2: null, ganador: null, consola: null, estado: 'pendiente' });
    }
    rounds.push(rnd);
  }

  assignConsoles(consolasCount);
}

function assignConsoles(c) {
  let slot = 1;
  rounds.flat().forEach(m => { if (m.estado !== 'completado') { m.consola = slot; slot = slot % c + 1; } });
}

async function savePartidos() {
  await sb.from('fifa_partidos').delete().eq('torneo_id', activeTorneo.id);
  const rows = rounds.flat().map(m => ({ id: m.id, torneo_id: m.torneo_id, ronda: m.ronda, posicion: m.posicion, p1: m.p1, p2: m.p2, score1: m.score1, score2: m.score2, ganador: m.ganador, consola: m.consola, estado: m.estado }));
  await sb.from('fifa_partidos').insert(rows);
}

async function loadPartidos() {
  if (!activeTorneo) return;
  const { data, error } = await sb.from('fifa_partidos').select('*').eq('torneo_id', activeTorneo.id).order('ronda').order('posicion');
  if (error) { console.error('loadPartidos:', error.message); return; }
  if (!data || !data.length) return;
  const maxRonda = Math.max(...data.map(m => m.ronda));
  rounds = [];
  for (let r = 0; r <= maxRonda; r++) rounds.push(data.filter(m => m.ronda === r));
  renderManage(); renderBracket(); renderDisplay(); renderStats();
  if (currentView === 'manage') setTimeout(() => injectRefreshBtn('manage'), 60);
  if (currentView === 'bracket') setTimeout(() => injectRefreshBtn('bracket'), 60);
  const ind = document.getElementById('tv-last-refresh');
  if (ind) ind.textContent = 'Actualizado ' + new Date().toLocaleTimeString('es-CR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function nextPow2(n) { let p = 1; while (p < n) p *= 2; return p; }
function seedOrder(n) { let s = [0, 1]; while (s.length < n) { const ns = [], len = s.length * 2; for (let i = 0; i < s.length; i++) { ns.push(s[i]); ns.push(len - 1 - s[i]); } s = ns; } return s; }
function roundName(r) { const t = rounds.length; if (r === t - 1) return 'Final'; if (r === t - 2) return 'Semifinal'; if (r === t - 3) return 'Cuartos de Final'; if (r === t - 4) return 'Octavos de Final'; return 'Ronda ' + (r + 1); }
function getMatch(id) { return rounds.flat().find(m => m.id == id); }

// ===================== MATCH MANAGEMENT =====================
function setWinner(matchId, player) {
  const m = getMatch(matchId);
  if (!m || m.estado === 'completado') return;
  m.ganador = m.ganador === player ? null : player;
  renderManage();
}

async function startMatch(matchId) {
  const m = getMatch(matchId);
  if (!m) return;
  m.estado = 'jugando';
  await sb.from('fifa_partidos').update({ estado: 'jugando' }).eq('id', matchId);
  renderManage(); renderBracket(); renderDisplay();
}

async function confirmWinner(matchId) {
  const m = getMatch(matchId);
  if (!m || !m.ganador) return;
  const s1 = parseInt(document.getElementById('s1-' + matchId)?.value);
  const s2 = parseInt(document.getElementById('s2-' + matchId)?.value);
  m.score1 = isNaN(s1) ? null : s1;
  m.score2 = isNaN(s2) ? null : s2;
  m.estado = 'completado';
  await sb.from('fifa_partidos').update({ ganador: m.ganador, score1: m.score1, score2: m.score2, estado: 'completado' }).eq('id', matchId);
  propagate();
  await updateNextRoundInDB(m.ronda);
  renderManage(); renderBracket(); renderDisplay(); renderStats();
}

async function resetMatch(matchId) {
  const m = getMatch(matchId);
  if (!m) return;
  m.ganador = null; m.score1 = null; m.score2 = null; m.estado = 'pendiente';
  clearDownstream(m.ronda, m.posicion);
  propagate();
  await savePartidos();
  renderManage(); renderBracket(); renderDisplay(); renderStats();
}

function propagate() {
  // Con byes: R0 puede tener menos partidos que R1.
  // Los ganadores de R0 llenan los slots de R1 que NO son bye players.
  // Identificamos cuántos bye players hay en R1 (slots con p1/p2 ya definidos desde buildRounds)
  for (let r = 1; r < rounds.length; r++) {
    const prev = rounds[r - 1], cur = rounds[r];
    // Contar bye players en esta ronda (jugadores que ya tenían nombre desde buildRounds)
    // Los ganadores de prev van a llenar los slots TBD de cur en orden
    let prevWinners = prev.map(m => m.ganador || null).filter(g => g !== null);
    let winIdx = 0;
    for (let i = 0; i < cur.length; i++) {
      if (cur[i].estado === 'completado') continue;
      let newP1 = cur[i].p1, newP2 = cur[i].p2;
      if (newP1 === 'TBD') { newP1 = prevWinners[winIdx++] || 'TBD'; }
      if (newP2 === 'TBD') { newP2 = prevWinners[winIdx++] || 'TBD'; }
      cur[i].p1 = newP1;
      cur[i].p2 = newP2;
    }
  }
}

async function updateNextRoundInDB(ronda) {
  if (ronda + 1 >= rounds.length) return;
  for (const m of rounds[ronda + 1]) {
    await sb.from('fifa_partidos').update({ p1: m.p1, p2: m.p2, ganador: null, estado: 'pendiente' }).eq('id', m.id);
  }
}

function clearDownstream(ronda, pos) {
  for (let r = ronda + 1; r < rounds.length; r++) {
    const mi = Math.floor(pos / Math.pow(2, r - ronda));
    const m2 = rounds[r]?.[mi];
    if (m2) { m2.ganador = null; m2.score1 = null; m2.score2 = null; m2.estado = 'pendiente'; m2.p1 = 'TBD'; m2.p2 = 'TBD'; }
  }
}

// ===================== RENDER MANAGE =====================
function renderManage() {
  const b = document.getElementById('manage-body');
  if (!b) return;
  if (!rounds.length) { b.innerHTML = '<div class="loader"><div class="spinner"></div>Cargando partidos...</div>'; loadPartidos(); return; }
  let html = '';
  rounds.forEach((round, ri) => {
    const visible = round.filter(m => m.p1 !== 'BYE' && m.p2 !== 'BYE');
    if (!visible.length) return;
    html += '<div class="section-title" style="margin-top:18px">' + roundName(ri) + '</div><div class="match-queue">';
    visible.forEach(m => {
      const playing = m.estado === 'jugando', done = m.estado === 'completado', tbd = m.p1 === 'TBD' || m.p2 === 'TBD';
      html += '<div class="match-card ' + (playing ? 'playing' : '') + ' ' + (done ? 'done' : '') + '">';
      html += '<div class="match-meta"><span class="round-badge">' + roundName(ri) + '</span>';
      if (m.consola) html += '<span class="console-badge">PS5 #' + m.consola + '</span>';
      if (done) html += '<span style="font-size:11px;color:#4cde8c">✓ Completado</span>';
      if (playing) html += '<span style="font-size:11px;color:var(--gold)">● En juego</span>';
      html += '</div>';
      if (tbd) {
        html += '<div class="tbd-notice">Esperando ronda anterior...</div>';
      } else {
        html += '<div class="match-players">';
        html += '<div class="mp ' + (m.ganador === m.p1 ? 'winner' : '') + ' ' + (m.ganador && m.ganador !== m.p1 ? 'loser' : '') + '" onclick="setWinner(' + m.id + ',\'' + m.p1 + '\')"><div style="font-size:10px;color:var(--text2);margin-bottom:2px">Jugador 1</div>' + m.p1 + '</div>';
        html += '<div class="vs-label">VS</div>';
        html += '<div class="mp ' + (m.ganador === m.p2 ? 'winner' : '') + ' ' + (m.ganador && m.ganador !== m.p2 ? 'loser' : '') + '" onclick="setWinner(' + m.id + ',\'' + m.p2 + '\')"><div style="font-size:10px;color:var(--text2);margin-bottom:2px">Jugador 2</div>' + m.p2 + '</div>';
        html += '</div>';
        if (!done) html += '<div class="score-row"><span style="font-size:12px;color:var(--text2)">Marcador:</span><input type="number" min="0" max="20" id="s1-' + m.id + '" placeholder="0" style="width:52px" value="' + (m.score1 ?? '') + '"><span class="score-sep">-</span><input type="number" min="0" max="20" id="s2-' + m.id + '" placeholder="0" style="width:52px" value="' + (m.score2 ?? '') + '"></div>';
        else if (m.score1 !== null) html += '<div style="font-size:13px;color:var(--text2);margin-bottom:8px">Marcador: <strong style="color:var(--gold)">' + m.score1 + ' - ' + m.score2 + '</strong></div>';
        html += '<div class="btn-row">';
        if (!done && !playing) html += '<button class="btn sm green" onclick="startMatch(' + m.id + ')">▶ Iniciar</button>';
        if (!done && m.ganador) html += '<button class="btn sm gold" onclick="confirmWinner(' + m.id + ')">✓ Confirmar ganador</button>';
        if (done) html += '<button class="btn sm danger" onclick="resetMatch(' + m.id + ')">↩ Revertir</button>';
        html += '</div>';
      }
      html += '</div>';
    });
    html += '</div>';
  });
  b.innerHTML = html;
}

function renderStats() {
  const g = document.getElementById('stats-grid');
  if (!g) return;
  const all = rounds.flat().filter(m => m.p1 !== 'BYE' && m.p2 !== 'BYE');
  const done = all.filter(m => m.estado === 'completado').length;
  const playing = all.filter(m => m.estado === 'jugando').length;
  g.innerHTML = `
    <div class="stat-card"><div class="stat-val">${all.length}</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-val" style="color:#4cde8c">${done}</div><div class="stat-label">Completados</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--gold)">${playing}</div><div class="stat-label">En juego</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--text2)">${all.length - done - playing}</div><div class="stat-label">Pendientes</div></div>
  `;
}

// ===================== RENDER BRACKET =====================
function renderBracket() {
  const c = document.getElementById('bracket-container');
  if (!c || !rounds.length) return;
  let html = '<div class="bracket-flex">';
  rounds.forEach((round, ri) => {
    html += '<div class="b-round"><div class="b-round-label">' + roundName(ri) + '</div><div class="b-col">';
    round.forEach(m => {
      if (m.p1 === 'BYE' || m.p2 === 'BYE') return;
      html += '<div class="b-match ' + (m.estado === 'jugando' ? 'playing' : '') + '">';
      [['p1','score1'],['p2','score2']].forEach(([pk, sk]) => {
        const p = m[pk], sc = m[sk], isW = m.ganador === p && p !== 'TBD', isL = m.ganador && m.ganador !== p && p !== 'TBD', isTBD = p === 'TBD';
        html += '<div class="b-player ' + (isW ? 'winner' : '') + ' ' + (isL ? 'loser' : '') + ' ' + (isTBD ? 'tbd' : '') + '"><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + p + '</span>';
        if (sc !== null && sc !== undefined) html += '<span class="b-score">' + sc + '</span>';
        if (m.estado === 'jugando' && m.consola) html += '<span class="b-console-tag">PS5#' + m.consola + '</span>';
        html += '</div>';
      });
      html += '</div>';
    });
    html += '</div></div>';
  });
  html += '</div>';
  c.innerHTML = html;
}

// ===================== TV DISPLAY =====================
function renderDisplay() {
  const b = document.getElementById('tv-body');
  if (!b) return;
  if (!rounds.length) { b.innerHTML = '<div style="text-align:center;padding:60px;color:rgba(255,255,255,.3);font-size:16px">Iniciá el torneo primero.</div>'; return; }
  const finalMatch = rounds[rounds.length - 1]?.[0];
  if (finalMatch?.ganador && finalMatch.ganador !== 'TBD' && finalMatch.ganador !== 'BYE') {
    b.innerHTML = '<div class="tv-champion"><div class="tv-trophy">🏆</div><div class="tv-ch-label">CAMPEÓN DEL TORNEO</div><div class="tv-ch-name">' + finalMatch.ganador + '</div></div>';
    return;
  }
  const consolas = activeTorneo?.consolas || 2;
  const playing = rounds.flat().filter(m => m.estado === 'jugando');
  const nextUp = rounds.flat().filter(m => m.estado === 'pendiente' && m.p1 !== 'TBD' && m.p2 !== 'TBD' && m.p1 !== 'BYE' && m.p2 !== 'BYE').slice(0, 5);
  let html = '<div class="tv-body"><div>';
  html += '<div class="tv-sec">Consolas</div><div class="tv-consoles">';
  for (let ci = 1; ci <= consolas; ci++) {
    const m = playing.find(m => m.consola === ci);
    html += '<div class="tv-con-card"><div class="tv-con-title">🎮 PS5 #' + ci + '</div>';
    if (m) {
      html += '<div class="tv-con-match"><div style="flex:1;text-align:center"><div class="tv-pname">' + m.p1 + '</div><div class="tv-pscore">' + (m.score1 ?? '-') + '</div></div><div class="tv-vs">VS</div><div style="flex:1;text-align:center"><div class="tv-pname">' + m.p2 + '</div><div class="tv-pscore">' + (m.score2 ?? '-') + '</div></div></div><div class="tv-round-tag">' + roundName(m.ronda) + '</div>';
    } else html += '<div class="tv-empty">Sin partido activo</div>';
    html += '</div>';
  }
  html += '</div>';
  html += '<div class="tv-sec">Bracket</div>';
  rounds.forEach((round, ri) => {
    html += '<div class="tv-bm-round"><div class="tv-bm-label">' + roundName(ri) + '</div><div class="tv-bm-matches">';
    round.forEach(m => {
      if (m.p1 === 'BYE' || m.p2 === 'BYE') return;
      html += '<div class="tv-bm-match ' + (m.estado === 'jugando' ? 'act' : '') + '">';
      [['p1','score1'],['p2','score2']].forEach(([pk, sk]) => {
        const p = m[pk], isW = m.ganador === p && p !== 'TBD', isL = m.ganador && m.ganador !== p && p !== 'TBD';
        html += '<div class="tv-bm-p ' + (isW ? 'w' : '') + ' ' + (isL ? 'l' : '') + '">' + (p === 'TBD' ? '?' : p) + (m[sk] !== null && m[sk] !== undefined ? ' (' + m[sk] + ')' : '') + '</div>';
      });
      html += '</div>';
    });
    html += '</div></div>';
  });
  html += '</div><div>';
  html += '<div class="tv-sec">Próximos</div>';
  if (nextUp.length) {
    html += '<div class="tv-queue">';
    nextUp.forEach((m, i) => {
      html += '<div class="tv-qi"><div class="tv-qnum">' + (i + 1) + '</div><div><div class="tv-qnames">' + m.p1 + ' <span style="color:var(--text2)">vs</span> ' + m.p2 + '</div><div class="tv-qround">' + roundName(m.ronda) + ' · PS5 #' + (m.consola || '?') + '</div></div></div>';
    });
    html += '</div>';
  } else html += '<div style="color:var(--text2);font-size:13px;font-style:italic">Sin partidos pendientes.</div>';
  html += '</div></div>';
  b.innerHTML = html;
}

// ===================== VISTA PÚBLICA (sin login) =====================
async function loadTorneoPublico(torneoId) {
  const { data: t } = await sb.from('fifa_torneos').select('*').eq('id', torneoId).single();
  if (!t) { showView('auth'); return; }
  activeTorneo = t;
  document.getElementById('tv-title').textContent = '⚽ ' + t.nombre.toUpperCase();
  await loadPartidos();
  showView('public');
  startAutoRefresh();
}

function pubTab(tab) {
  document.getElementById('pub-bracket').style.display = tab === 'bracket' ? '' : 'none';
  document.getElementById('pub-tv').style.display = tab === 'tv' ? '' : 'none';
  document.getElementById('pub-tab-bracket').classList.toggle('active', tab === 'bracket');
  document.getElementById('pub-tab-tv').classList.toggle('active', tab === 'tv');
  if (tab === 'tv') {
    const b = document.getElementById('pub-tv');
    b.innerHTML = document.getElementById('tv-body').innerHTML;
  } else {
    const b = document.getElementById('pub-bracket');
    b.innerHTML = document.getElementById('bracket-container').innerHTML;
  }
}

// ===================== HELPERS =====================
function showView(v) {
  currentView = v;
  ['auth','torneos','manage','bracket','display','public'].forEach(x => {
    const el = document.getElementById('view-' + x);
    if (el) el.classList.toggle('active', x === v);
    const nt = document.getElementById('ntab-' + x);
    if (nt) nt.classList.toggle('active', x === v);
  });
  if (v === 'manage')  loadPartidos();
  if (v === 'bracket') loadPartidos();
  if (v === 'display') { loadPartidos(); startAutoRefresh(); }
  if (v === 'torneos') loadTorneos();
  if (v !== 'display' && v !== 'public') stopAutoRefresh();
}

function startAutoRefresh() {
  stopAutoRefresh();
  autoRefreshInterval = setInterval(async () => {
    if ((currentView === 'display' || currentView === 'public') && activeTorneo) await loadPartidos();
  }, 10000);
}

function stopAutoRefresh() {
  if (autoRefreshInterval) { clearInterval(autoRefreshInterval); autoRefreshInterval = null; }
}

async function manualRefresh() {
  const btn = document.getElementById('btn-refresh');
  if (btn) { btn.textContent = '↻ Actualizando...'; btn.disabled = true; }
  await loadPartidos();
  if (btn) { btn.textContent = '↻ Actualizar'; btn.disabled = false; }
}

function injectRefreshBtn(viewId) {
  if (document.getElementById('btn-refresh')) return;
  const titleEl = document.querySelector('#view-' + viewId + ' .section-title');
  if (!titleEl) return;
  const btn = document.createElement('button');
  btn.id = 'btn-refresh'; btn.className = 'btn sm';
  btn.style.cssText = 'margin-left:12px;vertical-align:middle;font-size:12px;';
  btn.innerHTML = '↻ Actualizar'; btn.onclick = manualRefresh;
  titleEl.appendChild(btn);
}

function setMsg(id, msg, type = 'info') {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = msg ? '<div class="alert ' + type + '">' + msg + '</div>' : '';
}

// Clock
setInterval(() => {
  const e = document.getElementById('tv-clock');
  if (e) e.textContent = new Date().toLocaleTimeString('es-CR', { hour: '2-digit', minute: '2-digit' });
}, 1000);

// URL param ?torneo=ID — vista pública sin login
const torneoParam = new URLSearchParams(location.search).get('torneo');
if (torneoParam) {
  sb.auth.getSession().then(({ data: { session } }) => {
    if (!session) loadTorneoPublico(torneoParam);
    // Si hay sesión, el onAuthStateChange lo maneja
  });
}
</script>
